title: HomeFixGuide
description: "Your ultimate guide to home improvement, DIY projects, and repair tips for every homeowner."
url: "https://kkumakkuma.github.io"
baseurl: "/HomeFixGuide"
permalink: /:year/:month/:day/:title/
future: true

theme: minima

author:
  name: HomeFixGuide
  email: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

google_analytics: "G-K3SGVDHJKD"

exclude:
  - scripts/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock

# Social / Pinterest
social:
  name: SmartTemplates
  links:
    - https://pinterest.com/smarttemplates
